name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type (auto, patch, minor, major)
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      phase:
        description: Target release phase
        required: true
        type: choice
        options:
          - pre
          - rc
          - rtm

concurrency:
  group: release-state
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '10.0.x'

      - name: Update release state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin release-state >/dev/null 2>&1 || true

          if git show-ref --verify --quiet refs/remotes/origin/release-state; then
            STATE_JSON=$(git show origin/release-state:version-state.json)
          else
            RELEASES_JSON=$(gh release list --repo "${{ github.repository }}" --json tagName,isDraft,isPrerelease --limit 100 2>/dev/null || echo "[]")
            STATE_JSON=$(dotnet scripts/version.cs state --releases-json "$RELEASES_JSON")
          fi

          RELEASES_JSON=$(gh release list --repo "${{ github.repository }}" --json tagName,isDraft,isPrerelease --limit 100 2>/dev/null || echo "[]")
          NEW_STATE_JSON=$(dotnet scripts/version.cs bump --state "$STATE_JSON" --version-bump "${{ github.event.inputs.version_bump }}" --phase "${{ github.event.inputs.phase }}" --releases-json "$RELEASES_JSON")
          VERSIONS_JSON=$(dotnet scripts/version.cs calculate --state "$NEW_STATE_JSON")
          DEV_VERSION=$(echo "$VERSIONS_JSON" | jq -r '.devVersion')
          RELEASE_VERSION=$(echo "$VERSIONS_JSON" | jq -r '.rcVersion')

          mkdir -p ./artifacts/release-state
          printf '%s\n' "$NEW_STATE_JSON" > ./artifacts/release-state/version-state.json
          ./scripts/publish-branch-content.sh release-state ./artifacts/release-state "Bump release state to ${{ github.event.inputs.phase }} (${DEV_VERSION} / ${RELEASE_VERSION})"

          echo "## Release State Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- **State:** \`$(echo "$NEW_STATE_JSON" | jq -c '.')\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next Dev Version:** \`${DEV_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next Official Release Version:** \`${RELEASE_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
